name: Clarity
options:
  bundleIdPrefix: com.clarity
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_ENTITLEMENTS: ""

targets:
  Clarity:
    type: application
    platform: iOS
    sources:
      - path: Clarity/Sources
        type: group
      - path: Clarity/Assets.xcassets
        type: group
        excludes:
          - "**/Contents.json"
    settings:
      base:
        INFOPLIST_FILE: Clarity/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.clarity.app
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
